version: "3.7"

services:
## --------------------------- PORTFOLIO SITE --------------------------- ##
  portfolio_site:
    build: .
    image: portifolio
    networks:
      - portainerNet ## Nome da rede interna
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=portainerNet
        # Router HTTPS (certificado Let's Encrypt) - apenas domínios .com.br
        - traefik.http.routers.portfolio_site.rule=Host(`www.rodrigobroslavschi.com.br`) || Host(`rodrigobroslavschi.com.br`)
        - traefik.http.routers.portfolio_site.entrypoints=websecure
        - traefik.http.routers.portfolio_site.tls=true
        - traefik.http.routers.portfolio_site.tls.certresolver=letsencryptresolver
        - traefik.http.routers.portfolio_site.service=portfolio_site
        # Router HTTP para redirecionar para HTTPS
        - traefik.http.routers.portfolio_site_http.rule=Host(`www.rodrigobroslavschi.com.br`) || Host(`rodrigobroslavschi.com.br`)
        - traefik.http.routers.portfolio_site_http.entrypoints=web
        - traefik.http.routers.portfolio_site_http.middlewares=redirect-to-https
        - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
        - traefik.http.services.portfolio_site.loadbalancer.server.port=80
        - traefik.http.services.portfolio_site.loadbalancer.passHostHeader=true
## --------------------------- PORTFOLIO SITE --------------------------- ##

networks:
  portainerNet: ## Nome da rede interna
    external: true
    name: portainerNet ## Nome da rede interna
