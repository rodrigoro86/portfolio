<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo — Pipeline Style</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#111; font-family:'Space Grotesk',sans-serif; }</style>
</head>
<body>
<script type="text/babel">

const G = "#D4A832";
const Gd = "#D4A83255";
const Gm = "#D4A83299";

// ── Logo A: DAG Flow ─────────────────────────────────────────────────────────
// Directed acyclic graph — 1 source → 2 middle → 1 sink, with chevron connectors
function LogoA({ size = 120, bg = "#0c0c0c" }) {
  const w = size, h = size;
  const nr = size * 0.072; // node radius
  const nodes = [
    { id:'in',  x: w*0.18, y: h*0.50 },
    { id:'m1',  x: w*0.50, y: h*0.25 },
    { id:'m2',  x: w*0.50, y: h*0.75 },
    { id:'out', x: w*0.82, y: h*0.50 },
  ];
  const edges = [['in','m1'],['in','m2'],['m1','out'],['m2','out']];
  const pos = Object.fromEntries(nodes.map(n => [n.id, n]));

  function arrowPath(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const ux = dx/len, uy = dy/len;
    const sx = a.x + ux*nr*1.4, sy = a.y + uy*nr*1.4;
    const ex = b.x - ux*nr*1.4, ey = b.y - uy*nr*1.4;
    // arrowhead
    const ar = size*0.04;
    const px = ex - ux*ar*1.5, py = ey - uy*ar*1.5;
    const nx = -uy, ny = ux;
    return { line:`M${sx},${sy} L${ex},${ey}`, arrow:`M${ex},${ey} L${px+nx*ar},${py+ny*ar} L${px-nx*ar},${py-ny*ar}Z` };
  }

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
      <rect width={w} height={h} fill={bg}/>
      {edges.map(([a,b],i) => {
        const { line, arrow } = arrowPath(pos[a], pos[b]);
        return (
          <g key={i}>
            <path d={line} stroke={Gm} strokeWidth={size*0.018}/>
            <path d={arrow} fill={G}/>
          </g>
        );
      })}
      {nodes.map(n => (
        <g key={n.id}>
          <circle cx={n.x} cy={n.y} r={nr*2} fill={G} fillOpacity={n.id==='out'?0.15:0.08}/>
          <circle cx={n.x} cy={n.y} r={nr} fill={n.id==='out'?G:Gd} stroke={G} strokeWidth={size*0.016}/>
          {n.id==='out' && <circle cx={n.x} cy={n.y} r={nr*0.45} fill={bg}/>}
        </g>
      ))}
    </svg>
  );
}

// ── Logo B: Chevron Stream ───────────────────────────────────────────────────
// Three bold chevrons/arrows flowing right — bold, directional, iconic
function LogoB({ size = 120, bg = "#0c0c0c" }) {
  const w = size, h = size;
  const ch = h * 0.52;   // chevron height total
  const cw = w * 0.22;   // chevron width
  const gap = w * 0.28;
  const startX = w * 0.08;
  const midY = h / 2;

  function chevron(cx, opacity) {
    const hw = cw / 2, hh = ch / 2;
    return `M${cx},${midY - hh} L${cx + hw},${midY} L${cx},${midY + hh}`;
  }

  const offsets = [0, gap, gap*2];
  const opacities = [0.35, 0.65, 1.0];

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
      <rect width={w} height={h} fill={bg}/>
      {offsets.map((ox, i) => (
        <path key={i}
          d={chevron(startX + ox)}
          stroke={G} strokeWidth={size * 0.055}
          strokeOpacity={opacities[i]}
          strokeLinecap="round" strokeLinejoin="round"
        />
      ))}
      {/* Dot at the end */}
      <circle cx={startX + gap*2 + cw/2 + size*0.09} cy={midY} r={size*0.055} fill={G}/>
    </svg>
  );
}

// ── Logo C: Circular Pipeline ────────────────────────────────────────────────
// 4 nodes on a circle with directed arcs between them — represents the ML lifecycle loop
function LogoC({ size = 120, bg = "#0c0c0c" }) {
  const cx = size/2, cy = size/2;
  const R = size * 0.34;
  const nr = size * 0.062;
  const angles = [270, 0, 90, 180]; // top right bottom left
  const nodes = angles.map(a => ({
    x: cx + R * Math.cos(a * Math.PI/180),
    y: cy + R * Math.sin(a * Math.PI/180),
    a,
  }));

  function arcBetween(from, to, i) {
    // arc from node to node along the circle
    const startA = (from.a + 20) * Math.PI/180;
    const endA = (to.a - 20) * Math.PI/180;
    const sx = cx + R * Math.cos(startA), sy = cy + R * Math.sin(startA);
    const ex = cx + R * Math.cos(endA),   ey = cy + R * Math.sin(endA);
    const large = Math.abs(to.a - from.a) > 180 ? 1 : 0;
    // arrowhead
    const tangA = endA + Math.PI/2;
    const ar = size*0.04;
    const arrow = `M${ex},${ey} L${ex+Math.cos(tangA+0.4)*ar},${ey+Math.sin(tangA+0.4)*ar} L${ex+Math.cos(tangA-0.4)*ar},${ey+Math.sin(tangA-0.4)*ar}Z`;
    return { path:`M${sx},${sy} A${R},${R} 0 0,1 ${ex},${ey}`, arrow };
  }

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      <rect width={size} height={size} fill={bg}/>
      {/* Guide circle */}
      <circle cx={cx} cy={cy} r={R} stroke={G} strokeWidth={size*0.008} strokeOpacity={0.15} strokeDasharray={`${size*0.04} ${size*0.03}`}/>
      {/* Arcs */}
      {nodes.map((n,i) => {
        const next = nodes[(i+1)%nodes.length];
        const { path, arrow } = arcBetween(n, next, i);
        return (
          <g key={i}>
            <path d={path} stroke={G} strokeWidth={size*0.018} strokeOpacity={0.7} fill="none"/>
            <path d={arrow} fill={G}/>
          </g>
        );
      })}
      {/* Nodes */}
      {nodes.map((n,i) => (
        <g key={i}>
          <circle cx={n.x} cy={n.y} r={nr*1.8} fill={G} fillOpacity={0.1}/>
          <circle cx={n.x} cy={n.y} r={nr} fill={i===0?G:bg} stroke={G} strokeWidth={size*0.018}/>
        </g>
      ))}
      {/* Center label */}
      <circle cx={cx} cy={cy} r={size*0.12} fill={G} fillOpacity={0.07} stroke={G} strokeWidth={size*0.008} strokeOpacity={0.3}/>
      <circle cx={cx} cy={cy} r={size*0.04} fill={G}/>
    </svg>
  );
}

// ── Logo D: Branch & Merge ───────────────────────────────────────────────────
// Two paths branch from one, process, and merge — classic CI/CD / git flow symbol
function LogoD({ size = 120, bg = "#0c0c0c" }) {
  const w = size, h = size;
  const nr = size * 0.065;
  const p = {
    src:  { x: w*0.15, y: h*0.50 },
    top:  { x: w*0.50, y: h*0.22 },
    bot:  { x: w*0.50, y: h*0.78 },
    dst:  { x: w*0.85, y: h*0.50 },
  };

  function curve(a, b) {
    const mx = (a.x + b.x) / 2;
    return `M${a.x},${a.y} C${mx},${a.y} ${mx},${b.y} ${b.x},${b.y}`;
  }
  function arrowHead(from, to) {
    const dx = to.x - from.x, dy = to.y - from.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const ex = to.x - ux*nr*1.3, ey = to.y - uy*nr*1.3;
    const ar = size*0.042;
    const nx = -uy, ny = ux;
    return `M${to.x - ux*nr*1.3},${to.y - uy*nr*1.3} L${ex+nx*ar},${ey+ny*ar} L${ex-nx*ar},${ey-ny*ar}Z`;
  }

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
      <rect width={w} height={h} fill={bg}/>
      {/* Curves */}
      {[
        [p.src, p.top], [p.src, p.bot],
        [p.top, p.dst], [p.bot, p.dst],
      ].map(([a,b],i) => (
        <path key={i} d={curve(a,b)} stroke={G} strokeWidth={size*0.018} strokeOpacity={i<2?0.5:0.8} fill="none"/>
      ))}
      {/* Arrowheads into dst */}
      <path d={arrowHead(p.top, p.dst)} fill={G}/>
      {/* Nodes */}
      {[
        {n:p.src,  filled:true},
        {n:p.top,  filled:false},
        {n:p.bot,  filled:false},
        {n:p.dst,  filled:true},
      ].map(({n,filled},i) => (
        <g key={i}>
          <circle cx={n.x} cy={n.y} r={nr*2} fill={G} fillOpacity={0.1}/>
          <circle cx={n.x} cy={n.y} r={nr} fill={filled?G:bg} stroke={G} strokeWidth={size*0.018}/>
        </g>
      ))}
    </svg>
  );
}

// ── Preview wrapper ──────────────────────────────────────────────────────────
function Preview({ children, label, desc }) {
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:28}}>
      <div style={{display:'flex',gap:20,alignItems:'flex-end'}}>
        {[{bg:'#0c0c0c',label:'dark'},{bg:'#f5f0e8',label:'light'},{bg:'#0c0c0c',label:'large',size:200}].map(({bg,label:bl,size}) => (
          <div key={bl} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{background:bg,padding:28,border:bg==='#0c0c0c'?'1px solid #242424':'none',borderRadius:4}}>
              {React.cloneElement(children, { size: size||110, bg })}
            </div>
            <span style={{fontSize:11,color:'#555',fontFamily:'monospace'}}>{bl}</span>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:17,fontWeight:700,color:'#e8e4dc',marginBottom:5}}>{label}</div>
        <div style={{fontSize:13,color:'#7a7570',maxWidth:300,lineHeight:1.6}}>{desc}</div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas title="Logo Pipeline — Rodrigo Broslavschi">
      <DCSection id="s1" title="Pipeline Concepts">
        <DCArtboard id="a" label="A · DAG Flow" width={680} height={420}>
          <div style={{background:'#111',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Preview label="DAG Flow" desc="Grafo acíclico dirigido — 1 entrada, 2 processos paralelos, 1 saída. Representa MLOps pipelines com branching.">
              <LogoA/>
            </Preview>
          </div>
        </DCArtboard>
        <DCArtboard id="b" label="B · Chevron Stream" width={680} height={420}>
          <div style={{background:'#111',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Preview label="Chevron Stream" desc="Três setas progressivas — simples, bold, e extremamente legível em qualquer tamanho. Muito versátil como avatar/favicon.">
              <LogoB/>
            </Preview>
          </div>
        </DCArtboard>
        <DCArtboard id="c" label="C · ML Lifecycle" width={680} height={420}>
          <div style={{background:'#111',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Preview label="ML Lifecycle Loop" desc="4 nós em ciclo com arcos direcionados — representa o loop contínuo de treino, deploy, monitoramento e re-treino.">
              <LogoC/>
            </Preview>
          </div>
        </DCArtboard>
        <DCArtboard id="d" label="D · Branch & Merge" width={680} height={420}>
          <div style={{background:'#111',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Preview label="Branch & Merge" desc="Fork e merge de dois caminhos — ícone clássico de CI/CD e git flow. Reconhecível e tech ao mesmo tempo.">
              <LogoD/>
            </Preview>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
